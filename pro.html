<!DOCTYPE html>
<html>
<head>
    <title>My Proposal ❤️</title>
    <style>
        body {
            background: linear-gradient(to right, pink, lightblue);
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            font-size: 45px;
            color: darkred;
        }

        p {
            font-size: 25px;
            color: black;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 20px;
        }

        #yesBtn {
            background-color: green;
            color: white;
        }

        #noBtn {
            background-color: red;
            color: white;
            position: absolute;
        }

        #message {
            font-size: 30px;
            color: purple;
            margin-top: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>💖 Hey! I Have Something To Ask You 💖</h1>
    <p>Will you be mine forever? 🥺❤️</p>

    <button id="yesBtn" onclick="yesClicked()">YES 😍</button>
    <button id="noBtn" onmouseover="moveNo()">NO 😢</button>

    <div id="message"></div>

    <script>
        function yesClicked() {
            document.getElementById("message").innerHTML = "Yayyyy! ❤️😍 I Love You So Much 💕🎉";
        }

        function moveNo() {
            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 100);

            document.getElementById("noBtn").style.left = x + "px";
            document.getElementById("noBtn").style.top = y + "px";
        }
    </script>

</body>
</html>
