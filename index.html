<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Simple Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: #f7f7f7;
    }

    h1 {
      font-size: 36px;
      color: #333;
    }

    p {
      font-size: 18px;
      color: #666;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      color: white;
      background-color: #007bff;
      text-decoration: none;
      border-radius: 6px;
      border: 2px solid #0056b3;
      transition: 0.3s;
    }

    a:hover {
      background-color: #c81fbd;
    }
  </style>
</head>
<body>

  <h1>Welcome to my page</h1>
  <p>For surprise</p>

  <!-- If you want this link to go somewhere, replace "#" -->

</html>
